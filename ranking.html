<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>อันดับโรคผู้ป่วย</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}
header{
    background:#1a365d;
    color:white;
    padding:20px;
    text-align:center;
    position:relative;
}
.home-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:white;
    color:#1a365d;
    padding:8px 16px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
main{
    max-width:1100px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
select{
    padding:8px 12px;
    margin-bottom:20px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th, td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}
th{
    background:#1a365d;
    color:white;
}
.loading{
    text-align:center;
    font-weight:bold;
    color:#1a365d;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="home-btn">← กลับหน้าหลัก</a>
<h2>อันดับโรคผู้ป่วย</h2>
</header>

<main>

<label>เลือกประเภทผู้ป่วย: </label>
<select id="typeSelect">
    <option value="opd">OPD</option>
    <option value="ipd">IPD</option>
    <option value="opdncd">OPD NCD</option>
</select>

<div id="loading" class="loading">กำลังโหลดข้อมูล...</div>

<table id="dataTable" style="display:none">
    <thead></thead>
    <tbody id="tableBody"></tbody>
</table>

</main>

<script>

const sheetLinks = {
    ipd: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd70C-0YdcF0sP1oUGiNnclYpaCaydAFgbiXLvrox_7waSSKrHVgM7QbE11x5uXOs46dyuUnUVBgjm/pub?gid=0&single=true&output=csv",
    opd: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd70C-0YdcF0sP1oUGiNnclYpaCaydAFgbiXLvrox_7waSSKrHVgM7QbE11x5uXOs46dyuUnUVBgjm/pub?gid=1477225027&single=true&output=csv",
    opdncd: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd70C-0YdcF0sP1oUGiNnclYpaCaydAFgbiXLvrox_7waSSKrHVgM7QbE11x5uXOs46dyuUnUVBgjm/pub?gid=1278932577&single=true&output=csv"
};

async function loadCSV(url){
    const res = await fetch(url);
    const text = await res.text();
    const rows = text.trim().split(/\r?\n/);
    return rows.map(r => r.split(","));
}

// แก้ตัวเลขแบบ "5 154" ให้เป็น 5154
function cleanNumber(value){
    return value
        .replace(/"/g,"")
        .replace(/\s/g,"")
        .trim();
}

async function buildTable(){

    document.getElementById("loading").style.display="block";
    document.getElementById("dataTable").style.display="none";

    const type = document.getElementById("typeSelect").value;
    const rows = await loadCSV(sheetLinks[type]);

    const table = document.getElementById("dataTable");
    const body = document.getElementById("tableBody");
    const thead = table.querySelector("thead");

    body.innerHTML="";
    thead.innerHTML="";

    if(rows.length === 0){
        document.getElementById("loading").innerText="ไม่พบข้อมูล";
        return;
    }

    // สร้างหัวตาราง
    let headerRow = "<tr>";
    rows[0].forEach(col=>{
        headerRow += `<th>${col}</th>`;
    });
    headerRow += "</tr>";
    thead.innerHTML = headerRow;

    // ใส่ข้อมูล
    for(let i=1;i<rows.length;i++){

        if(rows[i].every(cell => cell.trim()==="")) continue;

        body.innerHTML += `
        <tr>
            ${rows[i].map(cell => `<td>${cleanNumber(cell)}</td>`).join("")}
        </tr>`;
    }

    document.getElementById("loading").style.display="none";
    document.getElementById("dataTable").style.display="table";
}

document.getElementById("typeSelect").addEventListener("change", buildTable);

buildTable();

</script>

</body>
</html>
