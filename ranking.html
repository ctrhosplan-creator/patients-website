<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายงานสถิติโรค</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    position:relative;
    background:#1a365d;
    color:white;
    padding:20px 0;
    text-align:center;
}

header h1{
    margin:0;
    font-size:22px;
}

.home-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:white;
    color:#1a365d;
    padding:8px 18px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

/* CONTENT */
main{
    max-width:1100px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

select{
    padding:8px 12px;
    margin-bottom:20px;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#1a365d;
    color:white;
}

tfoot{
    font-weight:bold;
    background:#edf2f7;
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="home-btn">← กลับหน้าหลัก</a>
    <h1>รายงานสถิติโรค OPD / IPD / OPD NCD</h1>
</header>

<main>

<select id="typeSelect">
    <option value="opd">OPD</option>
    <option value="ipd">IPD</option>
    <option value="opdncd">OPD NCD</option>
</select>

<table>
<thead>
<tr>
<th>โรค</th>
<th>2566</th>
<th>2567</th>
<th>2568</th>
<th>2569</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
<tfoot id="tableFoot"></tfoot>
</table>

</main>

<script>

/* ===============================
   CONFIG SHEET LINKS
================================ */

const sheetLinks = {
opd:{
"2568":"https://docs.google.com/spreadsheets/d/1-rZbUfkwik5EHhcfgvoNSRiSEG2MOIa0MGavp43NmwA/export?format=csv&gid=0",
"2569":"https://docs.google.com/spreadsheets/d/1-rZbUfkwik5EHhcfgvoNSRiSEG2MOIa0MGavp43NmwA/export?format=csv&gid=488560581"
},
ipd:{
"2568":"https://docs.google.com/spreadsheets/d/e/2PACX-1vRRguUkbI1WPemYRAI7QCJMgX9Tbvw961umVNShBwROZlWDT0GbxQy3IqMd4dZAZmcnEE4jMyOkhwMp/pub?gid=0&single=true&output=csv",
"2569":"https://docs.google.com/spreadsheets/d/e/2PACX-1vRRguUkbI1WPemYRAI7QCJMgX9Tbvw961umVNShBwROZlWDT0GbxQy3IqMd4dZAZmcnEE4jMyOkhwMp/pub?gid=43267423&single=true&output=csv"
},
opdncd:{
"2568":"https://docs.google.com/spreadsheets/d/1-rZbUfkwik5EHhcfgvoNSRiSEG2MOIa0MGavp43NmwA/export?format=csv&gid=1095088288",
"2569":"https://docs.google.com/spreadsheets/d/1-rZbUfkwik5EHhcfgvoNSRiSEG2MOIa0MGavp43NmwA/export?format=csv&gid=249677779"
}
};

/* ===============================
   STATIC DATA
================================ */

const staticData = {
opd:{
"2566":{},
"2567":{}
},
ipd:{
"2566":{
"Pneumonia":103,
"Head Injury":93,
"COPD":55,
"AGE":54,
"CHF":50
},
"2567":{
"Pneumonia":416,
"Sepsis":377,
"Senile cataract":311,
"Stroke":229,
"Intracranail injury":211
}
},
opdncd:{
"2566":{"DM":0,"HT":0,"Dyslipidemia":0,"Asthma":0,"COPD":0},
"2567":{"DM":0,"HT":0,"Dyslipidemia":0,"Asthma":0,"COPD":0}
}
};

/* ===============================
   FIXED LOAD CSV (แก้ปัญหา 0)
================================ */

async function loadCSV(url){
    try{
        const res = await fetch(url);
        const text = await res.text();
        const rows = text.split(/\r?\n/);
        const data = {};

        for(let i=1; i<rows.length; i++){
            if(!rows[i]) continue;

            const cols = rows[i].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if(!cols || cols.length < 3) continue;

            const disease = cols[1].replace(/"/g,"").trim();
            const count = parseInt(cols[2].replace(/"/g,"").trim());

            if(disease && !isNaN(count)){
                data[disease] = count;
            }
        }

        return data;

    }catch(e){
        console.log("โหลด CSV ไม่สำเร็จ:", e);
        return {};
    }
}

/* ===============================
   BUILD TABLE
================================ */

async function buildTable(type){

const years=["2566","2567","2568","2569"];
let allData={...staticData[type]};

for(let y of ["2568","2569"]){
    if(sheetLinks[type][y]){
        allData[y]=await loadCSV(sheetLinks[type][y]);
    }
}

const diseases = new Set();
years.forEach(y=>{
    Object.keys(allData[y]||{}).forEach(d=>diseases.add(d));
});

const body=document.getElementById("tableBody");
const foot=document.getElementById("tableFoot");
body.innerHTML="";
foot.innerHTML="";

let totals={"2566":0,"2567":0,"2568":0,"2569":0};

diseases.forEach(d=>{
    let row="<tr><td>"+d+"</td>";
    years.forEach(y=>{
        let val=allData[y]?.[d]||0;
        totals[y]+=val;
        row+="<td>"+val+"</td>";
    });
    row+="</tr>";
    body.innerHTML+=row;
});

let totalRow="<tr><td>รวม</td>";
years.forEach(y=>{
    totalRow+="<td>"+totals[y]+"</td>";
});
totalRow+="</tr>";
foot.innerHTML=totalRow;

}

document.getElementById("typeSelect")
.addEventListener("change",e=>{
    buildTable(e.target.value);
});

buildTable("opd");

</script>

</body>
</html>
