<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลสาเหตุการเสียชีวิต</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(to right,rgb(55,194,115),rgb(183,226,196));
}
header{
  text-align:center;
  padding:30px 20px;
}
main{
  max-width:900px;
  margin:auto;
  background:#ffffffeb;
  padding:25px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
}
.back{
  display:inline-block;
  margin-bottom:20px;
  padding:8px 14px;
  background:#043a22;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}
.back:hover{
  background:#065f37;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  padding:12px;
  text-align:center;
  border:1px solid #333;
}
th{
  background:#043a22;
  color:#fff;
}
tr:nth-child(even){
  background:#f2f2f2;
}
.loading{
  text-align:center;
  font-size:18px;
  padding:20px;
}
</style>
</head>

<body>

<header>
<h1>ข้อมูลสาเหตุการเสียชีวิต</h1>
</header>

<main>

<a href="index.html" class="back">← กลับหน้าหลัก</a>

<div id="sheetTable" class="loading">⏳ กำลังโหลดข้อมูล...</div>

</main>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTUqpsgf7K29NxV-kuTlMay7sO11u031BSK7C9GjRgrTxxVjJprMqtrhGWXOosWJH3dkVEo-dxc23El/pub?gid=0&single=true&output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(text => {

  const rows = text.trim().split(/\r?\n/);

  if(rows.length === 0){
    document.getElementById("sheetTable").innerHTML = "ไม่มีข้อมูล";
    return;
  }

  let html = "<table><thead><tr>";

  // สร้างหัวตารางจากชีตจริง
  const headers = rows[0].split(",");
  headers.forEach(h=>{
    html += "<th>"+h.replace(/"/g,"")+"</th>";
  });

  html += "</tr></thead><tbody>";

  // สร้างข้อมูลทั้งหมดตามลำดับชีต
  for(let i=1;i<rows.length;i++){
    if(!rows[i]) continue;
    const cols = rows[i].split(",");

    html += "<tr>";
    cols.forEach(c=>{
      let value = c.replace(/"/g,"").replace(/,/g,"").trim();
      if(!isNaN(value) && value !== ""){
        value = Number(value).toLocaleString("th-TH");
      }
      html += "<td>"+value+"</td>";
    });
    html += "</tr>";
  }

  html += "</tbody></table>";
  document.getElementById("sheetTable").innerHTML = html;

})
.catch(()=>{
  document.getElementById("sheetTable").innerHTML = "⚠️ โหลดข้อมูลไม่สำเร็จ";
});

</script>

</body>
</html>
